<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Launchpad</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<nav class="navbar">
  <a href="/" class="logo">Launchpad</a>
</nav>

<div class="onboarding-wrap">
  <div style="text-align:center;margin-bottom:2.5rem">
    <h2>Create your account</h2>
    <p class="sub">Join thousands of students on their path to a first internship.</p>
  </div>

  <div class="card" style="padding:2rem;display:flex;flex-direction:column;gap:1.25rem">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Jane Smith" />
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="jane@university.ac.uk" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Create a password" />
    </div>
    <button class="btn btn-primary w-full btn-lg" onclick="signup()">Create account →</button>
    <div style="text-align:center;font-size:0.85rem;color:var(--muted)">
      Already have an account? <a href="/signup.html" style="color:var(--indigo-light)">Log in</a>
    </div>
  </div>

  <div style="margin-top:2rem;text-align:center;font-size:0.78rem;color:var(--muted)">
    By signing up, you agree to our terms. No credit card required.
  </div>
</div>

<script>
function signup() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  if (!name || !email) {
    showToast('Please enter your name and email.', 'error');
    return;
  }
  // Store minimal info and go to onboarding
  localStorage.setItem('signup_name', name);
  localStorage.setItem('signup_email', email);
  location.href = '/onboarding.html';
}

function showToast(msg, type='success') {
  const c = document.getElementById('toast-container') || (() => {
    const el = document.createElement('div');
    el.className = 'toast-container'; el.id = 'toast-container';
    document.body.appendChild(el); return el;
  })();
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
</script>
</body>
</html>
