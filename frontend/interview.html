<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Prep — CareerAI</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .setup-panel {
      max-width: 520px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .setup-panel h2 { margin-bottom: 0.4rem; }
    .setup-panel .sub { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .score-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .assessment-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      font-size: 0.88rem;
    }
    .assessment-block h4 { font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.5rem; }
  </style>
</head>
<body>

<header class="page-header">
  <a class="logo" href="/">&#127775; CareerAI</a>
  <nav>
    <a href="/cv.html">CV &amp; Cover Letter</a>
    <a href="/application.html">Apply</a>
    <a href="/email.html">Cold Email</a>
    <a href="/interview.html" class="active">Interview Prep</a>
  </nav>
</header>

<!-- Setup panel (shown before session starts) -->
<div id="setup" class="setup-panel">
  <h2>&#127908; Interview Prep</h2>
  <p class="sub">Practice with role-specific questions. Speak or type your answers — you'll get scored on content, structure, and conciseness.</p>

  <div class="form-group">
    <label>Target Role</label>
    <input type="text" id="role" placeholder="Investment Banking Summer Analyst" />
  </div>
  <div class="form-group">
    <label>Company (optional)</label>
    <input type="text" id="company" placeholder="Goldman Sachs" />
  </div>
  <div class="form-group">
    <label>Interview Type</label>
    <select id="interview-type">
      <option value="mixed">Mixed (behavioural + technical)</option>
      <option value="technical">Technical only</option>
      <option value="behavioural">Behavioural only</option>
      <option value="case">Case study</option>
    </select>
  </div>
  <button class="btn btn-primary" onclick="startSession()" style="width:100%">Start Session &#128640;</button>
</div>

<!-- Chat UI (shown during session) -->
<div id="chat" class="chat-layout" style="display:none">
  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-area">
    <textarea id="input" placeholder="Type your answer... (or click the mic to speak)" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="voice-btn" id="voice-btn" onclick="toggleVoice()" title="Hold to speak">&#127908;</button>
    <button class="btn btn-primary" onclick="send()">Send</button>
  </div>
</div>

<script>
  const userId = localStorage.getItem('userId');
  const history = [];
  let sessionRole = '', sessionCompany = '', sessionType = '';
  let recognition = null;
  let isRecording = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  async function startSession() {
    sessionRole = document.getElementById('role').value.trim();
    sessionCompany = document.getElementById('company').value.trim();
    sessionType = document.getElementById('interview-type').value;

    if (!sessionRole) { alert('Please enter a target role.'); return; }

    document.getElementById('setup').style.display = 'none';
    document.getElementById('chat').style.display = 'flex';

    const thinking = addMessage('assistant', '<span class="thinking">Setting up your session...</span>');

    const res = await fetch('/api/interview/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        role: sessionRole,
        company: sessionCompany,
        interview_type: sessionType,
        user_id: userId ? parseInt(userId) : null,
      }),
    });
    const data = await res.json();
    const reply = data.reply || 'Ready to begin!';

    thinking.querySelector('.bubble').innerHTML = formatReply(reply);
    history.push({ role: 'assistant', content: reply });
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  function addMessage(role, html) {
    const wrap = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const icon = role === 'user' ? '&#128100;' : '&#127908;';
    div.innerHTML = `<div class="avatar">${icon}</div><div class="bubble">${html}</div>`;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
    return div;
  }

  function formatReply(text) {
    // Highlight assessment blocks
    text = text.replace(/---ASSESSMENT---([\s\S]*?)---END---/g, (_, inner) => {
      const lines = inner.trim().split('\n').map(l => l.trim()).filter(Boolean);
      let html = '<div class="assessment-block"><h4>&#128200; Assessment</h4>';
      const scoreRow = [];
      lines.forEach(line => {
        const scoreMatch = line.match(/^(Content|Structure|Conciseness):\s*(\d)\/5\s*[—–-]\s*(.+)/);
        if (scoreMatch) {
          const [, label, score, comment] = scoreMatch;
          const s = parseInt(score);
          const cls = s >= 4 ? 'score-high' : s >= 3 ? 'score-mid' : 'score-low';
          scoreRow.push(`<span class="score-badge ${cls}">${label}: ${score}/5</span>`);
          html += `<p><strong>${label}:</strong> ${comment}</p>`;
        } else if (line.startsWith('Overall:')) {
          html += `<p style="margin-top:0.5rem;color:var(--text-muted)">${line}</p>`;
        }
      });
      if (scoreRow.length) html = html.replace('<h4>&#128200; Assessment</h4>', `<h4>&#128200; Assessment</h4><div class="score-row">${scoreRow.join('')}</div>`);
      html += '</div>';
      return html;
    });

    // Highlight summary blocks
    text = text.replace(/---SUMMARY---([\s\S]*?)---END---/g, (_, inner) => {
      return `<div class="assessment-block" style="border-color:var(--accent)"><h4>&#127942; Session Summary</h4>${inner.trim().replace(/\n/g,'<br>')}</div>`;
    });

    return text.replace(/\n/g, '<br>');
  }

  async function send() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';

    addMessage('user', text.replace(/\n/g,'<br>'));
    history.push({ role: 'user', content: text });

    const thinking = addMessage('assistant', '<span class="thinking">Assessing your answer...</span>');

    const res = await fetch('/api/interview/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: history,
        user_id: userId ? parseInt(userId) : null,
        role: sessionRole,
        company: sessionCompany,
        interview_type: sessionType,
      }),
    });
    const data = await res.json();
    const reply = data.reply || 'Sorry, something went wrong.';

    thinking.querySelector('.bubble').innerHTML = formatReply(reply);
    history.push({ role: 'assistant', content: reply });
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  // ===== Voice Input (Web Speech API) =====
  function setupVoice() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      document.getElementById('voice-btn').style.display = 'none';
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-GB';

    recognition.onresult = (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      document.getElementById('input').value = transcript;
      autoResize(document.getElementById('input'));
    };

    recognition.onend = () => {
      isRecording = false;
      document.getElementById('voice-btn').classList.remove('recording');
    };
  }

  function toggleVoice() {
    if (!recognition) return;
    if (isRecording) {
      recognition.stop();
    } else {
      isRecording = true;
      document.getElementById('voice-btn').classList.add('recording');
      recognition.start();
    }
  }

  setupVoice();
</script>
</body>
</html>
